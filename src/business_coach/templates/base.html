<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Business Document{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia,wk');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media print {
            @page {
                size: A4;
                margin: 2cm;
                @bottom-center {
                    content: "Page " counter(page) " of " counter(pages);
                    font-size: 10pt;
                    color: #666;
                }
                @top-center {
                    content: "{{ topic_name }}";
                    font-size: 9pt;
                    color: #333;
                }
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 210mm;
            margin: 0 auto;
            padding: 2cm;
        }

        h1 {
            font-size: 24pt;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5em;
            border-bottom: 2px solid #16213e;
            padding-bottom: 0.3em;
        }

        h2 {
            font-size: 18pt;
            font-weight: 600;
            color: #1a1a2e;
            margin-top: 1.5em;
            margin-bottom: 0.8em;
            padding-left: 0.3em;
            border-left: 4px solid #16213e;
        }

        h3 {
            font-size: 14pt;
            font-weight: 600;
            color: #2d3748;
            margin-top: 1.2em;
            margin-bottom: 0.5em;
        }

        p {
            margin-bottom: 1em;
            text-align: justify;
        }

        ul, ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }

        li {
            margin-bottom: 0.5em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-size: 10pt;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 0.8em;
            text-align: left;
        }

        th {
            background-color: #16213e;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .meta-info {
            margin-bottom: 2em;
            padding: 1em;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            border-radius: 8px;
        }

        .meta-info p {
            margin-bottom: 0.3em;
            text-align: left;
            color: #e0e0e0;
        }

        .generated-date {
            font-size: 9pt;
            color: #666;
            margin-top: 2em;
            padding-top: 1em;
            border-top: 1px solid #ddd;
        }

        section {
            page-break-after: always;
        }

        :last-child {
            page-break-after: auto;
        }
    </style>
</head>
<body>
    <div class="meta-info">
        <p><strong>Business Document</strong></p>
        <p>Topic: {{ topic_name }}</p>
        <p>Generated: {{ generated_date }}</p>
    </div>

    {% block content %}{% endblock %}

    <div class="generated-date">
        Generated on {{ generated_date }} | mPABS Business Coach
    </div>
</body>
</html>
